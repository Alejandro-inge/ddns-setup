#rndc

zone local.lan. {
    primary 127.0.0.1;
    key rndc-key;
}

zone 4.0.10.in-addr.arpa. {
    primary 127.0.0.1;
    key rndc-key;
}

authoritative;

ddns-updates on;
ddns-update-style interim;
update-static-leases on;

ddns-domainname "local.lan";
ddns-rev-domainname "in-addr.arpa";

max-lease-time 7200;
default-lease-time 7200;

subnet 10.0.4.0 netmask 255.255.255.0 {
    range 10.0.4.50 10.0.4.200;
    option routers 10.0.4.1;
    option domain-name "local.lan";
    option domain-name-servers 10.0.4.2;
    option broadcast-address 10.0.4.255;
}
